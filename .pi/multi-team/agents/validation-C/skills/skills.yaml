skills:
  - name: style-validation
    description: Validate UI styles and design consistency
    operations:
      - style-check
      - design-system-validation
      - accessibility-audit
      - color-contrast-checking

  - name: schema-compliance
    description: Validate UI components against schema definitions
    operations:
      - zod-validation
      - json-schema-checking
      - type-safety-verification
      - structure-consistency-checking

  - name: guideline-enforcement
