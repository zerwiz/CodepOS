# Validation-B Agent Skills Configuration
# Skills for automated testing, E2E validation, and performance testing capabilities

skills:
  - name: automated-testing
    description: Execute automated test suites and verify system functionality
    operations:
      - test-discovery
      - test-execution
      - result-aggregation
      - failure-analysis
      - parallel-runs

  - name: regression-tests
    description: Perform regression testing across all system components
    operations:
      - test-suite-execution
      - baseline-comparison
      - anomaly-detection
      - status-reporting
      - flaky-test-fix

  - name: e2e-validation
    description: End-to-end validation of user journeys and system flows
    operations:
      - user-journey-validation
      - flow-verification
      - state-transition-testing
      - cross-browser-testing
      - accessibility-testing

  - name: performance-testing
    description: Performance and load testing capabilities
    operations:
      - load-testing
      - stress-testing
      - throughput-measurement
      - latency-monitoring
      - resource-utilization

  - name: e2e-scenarios
    description: Execute complex end-to-end scenarios
    operations:
      - scenario-definition
      - data-seeding
      - workflow-execution
      - result-verification
      - cleanup

  - name: test-orchestration
    description: Coordinate and manage multiple test suites
    operations:
      - suite-orchestration
      - parallel-execution
      - result-merging
      - failure-correlation
      - prioritization

  - name: test-reporting
    description: Generate comprehensive test execution reports
    operations:
      - junit-generation
      - coverage-reporting
      - metrics-tracking
      - dashboard-updates
      - trend-analysis

  - name: test-data-management
    description: Manage test data and fixtures
    operations:
      - fixture-creation
      - data-seeding
      - teardown
      - isolation-verification
      - cleanup

metadata:
  version: "1.0.0"
  author: "CodepOS Multi-Agent System"
  last_updated: "2024-01-01T00:00:00Z"
  capabilities_count: 8
  active: true
  team: validation-B
  role: tester
  priority: 4
  dependencies:
    - setup
    - ui-gen-A
  configuration:
    stage: qa_tests
    checks:
      - automated-tests
      - regression-tests
      - e2e-validation
    timeout: 60
    sandbox: true
