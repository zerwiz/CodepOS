# Setup Agent Context
# This context defines the operational environment and initial state for the setup agent

project:
  name: "CodepOS Multi-Agent Orchestration System"
  purpose: "UI generation and validation framework"
  architecture: "Hierarchical agent teams with parent-child supervision"

initial_state:
  directories:
    - path: ".pi/multi-team/"
      purpose: "Multi-team directory"
    - path: ".pi/multi-team/agents/"
      purpose: "Agent directories"
    - path: ".pi/multi-team/teams/"
      purpose: "Team definitions"
    - path: ".pi/multi-team/sessions/"
      purpose: "Sessions directory"

available_resources:
  documentation:
    - path: "/home/zerwiz/CodeP/CodepOS/CLAUDE.md"
    - path: "/home/zerwiz/CodeP/CodepOS/README.md"
    - path: "/home/zerwiz/CodeP/CodepOS/.pi/multi-team/README.md"

  configuration_files:
    - path: "/home/zerwiz/CodeP/CodepOS/.pi/multi-team/multi-team-config.yaml"
    - path: "/home/zerwiz/CodepOS/.pi/multi-team/multi-team-config-min.yaml"
    - path: "/home/zerwiz/Codep/CodepOS/.env"
      note: "Optional, loaded if exists"

  team_definitions:
    path: "/home/zerwiz/CodeP/CodepOS/.pi/multi-team/teams/*.yaml"

  skills_and_expertise:
    skills:
      path: ".pi/multi-team/skills/"
    expertise:
      path: ".pi/multi-team/expertise/"
    hooks:
      path: ".pi/multi-team/hooks/"

capabilities:
  - validate_project_structure
  - initialize_agent_teams
  - load_configuration_files
  - manage_session_state
  - coordinate_team_operations
  - verify_dependencies
  - health_check_infrastructure

initial_tasks:
  - "Validate .pi/multi-team/ directory structure"
  - "Load and parse multi-team-config.yaml"
  - "Verify all team definitions in teams/ directory"
  - "Ensure all agent subdirectories are properly initialized"
  - "Check for .env file and load environment variables"
  - "Verify justfile contains all necessary team definitions"
  - "Create missing agent manifest files if needed"

environment_context:
  working_directory: "/home/zerwiz/CodeP/CodepOS"
  pi_cli_location: "/home/zerwiz/.npm-global/bin/pi"
  pi_version: "v0.70.2"
  os: "Linux"
  shell: "sh"

agent_communication_protocol:
  - "Use YAML for agent definitions"
  - "Use MD5 checksums for integrity tracking (stored in mds/ subdirectories)"
  - "All agents must read shared_context from multi-team-config.yaml"
  - "Agents should coordinate through sessions/ directory"

commands_reference:
  - "just team <team-name> - Run a team"
  - "just team setup --env VAR=value - Setup with custom env"
  - "just team validation --stage=<stage> --checks=<checks> - Run validation"

status:
  initialized: true
  teams_loaded: true
  ready_to_orchestrate: true
