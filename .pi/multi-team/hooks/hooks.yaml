### Hook Rules

1. **Execute in Order**: Follow priority order
2. **Chain Execution**: Each hook triggers next
3. **Fail Fast**: Abort if step fails
4. **Log Everything**: Track all hook executions
5. **Notify Team**: Alert on failures
6. **Retry Failed**: Retry up to 3 times

### Hook Integration

These hooks integrate with:

- **Agent Stream**: Agents execute hooks in order
- **Mental Model**: Hooks update patterns
- **Team Config**: Hooks defined per team
- **Conversation Log**: Hooks track context
- **File State**: Hooks operate on files

### Example Hook Trigger

```yaml
Task: Create login form
Triggered hooks:
  1. hook-init-agent (startup)
  2. hook-receive-task (parse requirements)
  3. hook-plan-execution (create plan)
  4. hook-execute-task (create files)
  5. hook-verify-work (check code)
  6. hook-update-mental-model (record pattern)
  7. hook-deliver-output (deliver work)
  8. hook-read-conversation (read context)
```

